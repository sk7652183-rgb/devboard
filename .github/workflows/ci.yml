# Goals- I want to Lint,build and test my code for frontend and backend
# Then Push the images to dockerhub
name: CI

on:
  push:
     paths:
        - '**'
        - '!.github/workflows/**'
     branches: [master]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v7
     - name: setup nodejs
       uses: actions/setup-node@v6
       with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
     - name: Install packages
       run: npm install
       working-directory: frontend
     - name: Lint
       run: npm run lint
       working-directory: frontend
     - name: Test
       run: npm run test
       working-directory: frontend
     - name: Login to Docker Hub
       uses: docker/login-action@v4
       with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
     - name : Build and Push Docker Image
       uses: docker/build-push-action@v7
       with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest

  lint-backend:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v7
     - name: setup go
       uses: actions/setup-go@v5
       with:
          go-version: '1.22'
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
     - name: Run go formatter
       run: go fmt 
       working-directory: backend
     - name: Run go vet
       run: go vet 
       working-directory: backend
     - name: Test
       run: go test 
       working-directory: backend
     - name: Login to Docker Hub
       uses: docker/login-action@v4
       with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
     - name: Build and Push Docker Image
       uses: docker/build-push-action@v7
       with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest

  build-and-push:
    needs: [lint-frontend, lint-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Images
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest ./frontend
          docker push ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest ./backend
          docker push ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest

  deploy:
    needs: [lint-frontend, lint-backend]
    uses: ./.github/workflows/cd.yml
    
    secrets: inherit
