name: CI

on:
  push:
    branches: [feat/matrix-docker-build]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install packages
        run: npm install
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Test
        run: npm run test
        working-directory: frontend

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Run go formatter
        run: go fmt
        working-directory: backend
      - name: Run go vet
        run: go vet
        working-directory: backend
      - name: Test
        run: go test
        working-directory: backend

  build-and-push:
    needs: [lint-frontend, lint-backend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        folder: [frontend, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Images
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.folder }}
          file: ./${{ matrix.folder }}/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folder }}:latest

          
  deploy:
    needs: [lint-frontend, lint-backend, build-and-push]
    uses: ./.github/workflows/cd.yml
    secrets: inherit