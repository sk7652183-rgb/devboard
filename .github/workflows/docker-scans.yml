# Goal -  Ensure the docker files and docker images are scanned for vulnerabilities and best practices.

name: Docker Scan
on:
  workflow_call:

jobs:
  docker-file-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folders: [backend, frontend]
    steps:
      - name: Code Checkout
        uses: actions/checkout@v7
      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.folders }}/Dockerfile
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
      - name: Docker Image build
        run: docker build -t ${{vars.DOCKERHUB_USERNAME}}//devboard:${{ matrix.folders }}:latest .
        working-directory: ${{ matrix.folders }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{vars.DOCKERHUB_USERNAME}}//devboard:${{ matrix.folders }}:latest .
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'