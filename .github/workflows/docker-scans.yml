# Goal -  Ensure the docker files and docker images are scanned for vulnerabilities and best practices.

name: Docker Scan
on:
  workflow_call:

jobs:
  docker-file-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folders: [backend, frontend]
    steps:
      - name: Code Checkout
        uses: actions/checkout@v7
      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.folders }}/Dockerfile