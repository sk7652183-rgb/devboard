# Goal - I have to ensure the packages and dependencies used in the application are free from known vulnerabilities
name: Dependency_scan
on:
    workflow_call:
jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Install Govolncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@1.3.0
      - name: GoVulncheck
        run: govulncheck ./...
        working-directory: backend
      - name: Setup NodeJs
        uses: actions/setup-node@v6
        with:
          version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Run Dependency Check for NodeJs
        run: npm audit
        working-directory: frontend
