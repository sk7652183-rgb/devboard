# Goals- I want to Lint,build and test my code for frontend and backend
# Then Push the images to dockerhub
name: CI

on:
  workflow_dispatch:
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v7
     - name: Test
       run: npm run test
       working-directory: frontend
     - name: Code_Quality
       uses: ./.github/workflows/code-quality.yml
     - name: Login to Docker Hub
       uses: docker/login-action@v4
       with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
     - name : Build and Push Docker Image
       uses: docker/build-push-action@v7
       with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest

  backend:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v7
     
     - name: Test
       run: go test 
       working-directory: backend
     - name: Login to Docker Hub
       uses: docker/login-action@v4
       with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
     - name: Build and Push Docker Image
       uses: docker/build-push-action@v7
       with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest
  
  deploy:
    needs: [frontend, backend]
    uses: ./.github/workflows/cd.yml
    
    secrets: inherit
